version: "3.8"

services:
  app:
    build: .
    container_name: library_app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    environment:
      PORT: 5000
      DB_NAME: library_db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_HOST: db
      DB_PORT: 3306
    command: npm run dev

  db:
    image: mysql:8
    container_name: library_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: library_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
